name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  rust:
    strategy:
      matrix:
        include:
          - name: windows-amd64
            os: windows-latest
          - name: macos-aarch64
            os: macos-latest
          - name: macos-x64
            os: macos-15-intel
    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --release
      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          powershell Compress-Archive -Path target\release\cnm.exe -DestinationPath cnm-${{github.ref_name}}-${{ matrix.name }}.zip

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          tar -czvf cnm-${{github.ref_name}}-${{ matrix.name }}.tar.gz -C target/release cnm
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: | 
            *.gz
            *.zip
          tag_name: ${{ github.ref_name }}
